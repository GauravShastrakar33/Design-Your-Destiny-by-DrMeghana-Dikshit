    <script>
      // 🚨 Advanced Diagnostic 2.0: Active BEFORE any other resource
      (function () {
        function showError(title, message, details) {
          if (document.getElementById("diag-error")) return;
          var div = document.createElement("div");
          div.id = "diag-error";
          div.style.position = "fixed";
          div.style.top = "0";
          div.style.left = "0";
          div.style.width = "100%";
          div.style.height = "100%";
          div.style.backgroundColor = "#ff0000";
          div.style.color = "#ffffff";
          div.style.zIndex = "99999";
          div.style.padding = "20px";
          div.style.overflowY = "auto";
          div.style.fontFamily = "monospace";
          div.innerHTML =
            "<h2>🛑 " +
            title +
            "</h2>" +
            "<p><strong>Message:</strong> " +
            message +
            "</p>" +
            (details
              ? '<div style="background: rgba(0,0,0,0.2); padding: 10px; margin-top: 10px;">' +
                details +
                "</div>"
              : "") +
            '<button onclick="location.reload()" style="padding: 10px; margin-top: 20px; background: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">RETRY APP</button>';
          document.body.appendChild(div);
        }

        window.onerror = function (msg, url, line, col, err) {
          showError(
            "Runtime Error",
            msg,
            "Line: " +
              line +
              ", Col: " +
              col +
              (err ? "<br>Stack: " + err.stack : "")
          );
          return false;
        };

        window.addEventListener(
          "error",
          function (event) {
            if (
              event.target &&
              (event.target.tagName === "SCRIPT" ||
                event.target.tagName === "LINK")
            ) {
              var url = event.target.src || event.target.href;
              var title = "Resource Load Failure";
              var message = "Failed to load: " + url;

              fetch(url)
                .then(function (r) {
                  var details =
                    "Status: " +
                    r.status +
                    " " +
                    r.statusText +
                    "<br>URL: " +
                    r.url +
                    "<br>Type: " +
                    r.type;
                  showError(title + " (Fetch Status)", message, details);
                })
                .catch(function (e) {
                  var details =
                    "Fetch blocked/failed: " +
                    e.message +
                    "<br>Likely security policy restriction.";
                  showError(
                    title + " (Network/Security Block)",
                    message,
                    details
                  );
                });
            }
          },
          true
        );

        console.log("🛠️ Diagnostic suite 2.0 initialized");
      })();

      // ⚡ Capacitor initialization bridge stub (Prevents triggerEvent crash)
      if (!window.Capacitor) {
        window.Capacitor = {
          triggerEvent: function (name, target, data) {
            console.warn(
              "⚡ Capacitor bridge NOT ready, buffered event:",
              name,
              data
            );
            return true;
          },
          getPlatform: function () {
            return "web";
          }, // Fallback
          isNativePlatform: function () {
            return false;
          },
        };
      }
    </script>
